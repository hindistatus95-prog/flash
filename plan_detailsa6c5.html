<script>
    const timerElement = document.getElementById('cryptoTimer');

    let minutes = 59;
    let seconds = 0;

    function updateTimer() {

        seconds--;
        if (seconds < 0) {
            seconds = 59;
            minutes--;
        }


        if (minutes < 0) {
            clearInterval(timerInterval);
            timerElement.textContent = "00:00";
            return;
        }


        const formattedMinutes = minutes.toString().padStart(2, '0');
        const formattedSeconds = seconds.toString().padStart(2, '0');
        timerElement.textContent = `${formattedMinutes}:${formattedSeconds}`;
    }


    const timerInterval = setInterval(updateTimer, 1000);
</script>

<script>
fetch('https://restcountries.com/v3.1/all?fields=name,cca2')
  .then(response => response.json())
  .then(data => {
    data.sort((a, b) => a.name.common.localeCompare(b.name.common));
    const datalist = document.getElementById('countries');
    data.forEach(country => {
      const option = document.createElement('option');
      option.value = country.name.common;
      datalist.appendChild(option);
    });
    const select = document.getElementById('countrySelect');
    data.forEach(country => {
      const opt = document.createElement('option');
      opt.value = country.name.common;
      opt.textContent = country.name.common;
      select.appendChild(opt);
    });
  })
  .catch(error => console.error('Error fetching countries:', error));
</script>
<script>
    function validateForm() {
        const bep20 = document.getElementById("bep20_address").value.trim();
        const trc20 = document.getElementById("trc20_address").value.trim();
        const erc20 = document.getElementById("erc20_address").value.trim();
        const country = document.getElementById("countryInput").value.trim() || document.getElementById("countrySelect").value.trim();
        const txId = document.querySelector("input[name='transaction_id']").value.trim();

        if (bep20 === "" && trc20 === "" && erc20 === "") {
            alert("Please enter at least one wallet address (BEP20, TRC20, or ERC20).");
            return false;
        }

        if (country === "") {
            alert("Please select your country.");
            return false;
        }

        if (!/^[a-zA-Z0-9]+$/.test(txId) || txId.length < 64) {
            alert("Transaction ID must be alphanumeric and at least 64 characters long.");
            return false;
        }

        return true;
    }

    function closePopup() {
        document.getElementById("thankYouPopup").style.display = "none";
    }
</script>
<script>
function setupModal(openBtnId, qrId, modalId) {
  const modal = document.getElementById(modalId);
  const openBtn = document.getElementById(openBtnId);
  const qrImg = document.getElementById(qrId);
  const closeBtn = modal.querySelector(".close");

  openBtn.onclick = qrImg.onclick = () => { modal.style.display = "flex"; };
  closeBtn.onclick = () => { modal.style.display = "none"; };

  window.addEventListener("click", e => {
    if (e.target === modal) modal.style.display = "none";
  });
}

setupModal("bepViewBtn", "bepQrCode", "bepModal");
setupModal("trcViewBtn", "trcQrCode", "trcModal");
setupModal("ercViewBtn", "ercQrCode", "ercModal");
</script>
